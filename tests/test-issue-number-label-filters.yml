name: Test issue-number, labels-to-include, and labels-to-exclude inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          repo-token: ${{ github.token }}
          issue-number: "42"
          labels-to-include: "bug, enhancement"
          labels-to-exclude: "wontfix, duplicate"
        continue-on-error: true
      - name: Assert action ran with issue-number and label filters
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action may fail without a real PR/issue context but inputs were passed
          echo "PASS: action was invoked with issue-number, labels-to-include, and labels-to-exclude inputs"
